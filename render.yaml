services:
  - type: web
    name: rajeshgpt
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: "huggingface"
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_MODEL
        value: "Qwen/Qwen2.5-7B-Instruct"
      - key: UPLOAD_DIR
        value: "/tmp/rajeshgpt/uploads"
      - key: EMBEDDINGS_DIR
        value: "/tmp/rajeshgpt/embeddings"
